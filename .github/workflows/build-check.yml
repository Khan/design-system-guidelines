# PR status check: the Storybook must compile (one unclosed JSX tag in any
# MDX file breaks the whole site, so this gates merges even though the
# Chromatic workflow also builds).
name: Build check

on:
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v5

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile

            - run: pnpm typecheck

            - run: pnpm build
