# Deploys the Storybook to GitHub Pages on every merge to main.
# Mirrors wonder-blocks' gh-pages.yml (Pages artifact flow — repo Settings →
# Pages → Source must be "GitHub Actions"), minus its monorepo-only steps.
name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    # Allows us to run this workflow manually from the Actions tab
    workflow_dispatch:

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v5

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Storybook
              # Generates the static site (and MCP manifests) in "storybook-static/"
              run: pnpm build

            - name: Archive Storybook artifact
              # Replicates what actions/upload-pages-artifact does internally:
              # --dereference and --hard-dereference resolve symlinks and hard
              # links (the latter are created by pnpm's content-addressable
              # store) so that the GitHub Pages deployment doesn't reject them.
              shell: sh
              run: |
                  tar \
                    --dereference --hard-dereference \
                    --directory "./storybook-static" \
                    -cvf "$RUNNER_TEMP/artifact.tar" \
                    --exclude=.git \
                    --exclude=.github \
                    .

            - name: Upload Storybook artifact
              uses: actions/upload-artifact@v6
              with:
                  name: github-pages
                  path: "${{ runner.temp }}/artifact.tar"

    deploy:
        needs: build
        runs-on: ubuntu-latest
        # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
        permissions:
            pages: write # to deploy to Pages
            id-token: write # to verify the deployment originates from an appropriate source

        # Deploy to the github-pages environment
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
